name: Build and Sign Termux Suite

on:
  workflow_dispatch: # Allows manual trigger from GitHub UI
  push:
    branches: [ master, main ]

jobs:
  build-suite:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - repo: "termux/termux-app"
            name: "termux-app"
          - repo: "termux/termux-x11"
            name: "termux-x11"
          - repo: "termux/termux-api"
            name: "termux-api"
          - repo: "termux/termux-boot"
            name: "termux-boot"
          - repo: "termux/termux-float"
            name: "termux-float"
          - repo: "termux/termux-tasker"
            name: "termux-tasker"
          - repo: "termux/termux-widget"
            name: "termux-widget"
          - repo: "termux/termux-styling"
            name: "termux-styling"

    steps:
    - name: Checkout Target Termux Repository
      uses: actions/checkout@v4
      with:
        repository: ${{ matrix.repo }}
        path: ${{ matrix.name }}
        submodules: 'recursive'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Accept Android SDK Licenses
      run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

    - name: Decode Custom Keystore
      run: |
        echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > $HOME/shared.keystore
        # Verify it decoded correctly (should be a valid JKS/PKCS12)
        keytool -list -keystore $HOME/shared.keystore -storepass ultralytics123 -noprompt 2>&1 | head -5

    - name: Setup Gradle Cache
      uses: gradle/actions/setup-gradle@v3

    - name: Build APK
      working-directory: ${{ matrix.name }}
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon

    - name: Re-sign APKs with shared keystore
      run: |
        # Find apksigner from whatever build-tools version is available
        APKSIGNER=$(find $ANDROID_HOME/build-tools -name "apksigner" -type f | sort -V | tail -1)
        echo "Using apksigner: $APKSIGNER"
        find ${{ matrix.name }} -path "*/build/outputs/apk/*.apk" | while read apk; do
          echo "Re-signing: $apk"
          "$APKSIGNER" sign \
            --ks $HOME/shared.keystore \
            --ks-key-alias sharedkey \
            --ks-pass pass:ultralytics123 \
            --key-pass pass:ultralytics123 \
            "$apk"
          echo "Cert after re-sign:"
          "$APKSIGNER" verify --print-certs "$apk" | grep "SHA-256"
        done

    - name: Upload Signed APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.name }}-signed
        path: ${{ matrix.name }}/**/build/outputs/apk/**/*.apk

  publish-suite:
    needs: build-suite
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout Assets Repository
      uses: actions/checkout@v4

    - name: Download Signed APKs
      uses: actions/download-artifact@v4
      with:
        path: temp-apks

    - name: Organize APKs into /apps
      run: |
        mkdir -p apps
        find temp-apks -name "*.apk" | while read apk; do
          filename=$(basename "$apk")
          # Extract directory name which corresponds to matrix name (e.g. termux-app-signed)
          # Path looks like: temp-apks/termux-app-signed/path/to/apk
          # We parse it relative to temp-apks
          rel_path=${apk#temp-apks/}
          dir_name=${rel_path%%/*}
          app_name=${dir_name%-signed}
          
          # Copy with clean prefix if name doesn't match
          if [[ "$filename" == *"${app_name}"* ]]; then
            cp "$apk" "apps/$filename"
          else
            cp "$apk" "apps/${app_name}-${filename}"
          fi
        done
        rm -rf temp-apks

    - name: Commit and Push APKs to Assets Repository
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add apps/
        if git diff --staged --quiet; then
          echo "No new APK changes detected."
        else
          git commit -m "Automated update of Termux Suite APKs"
          git push origin main
        fi
